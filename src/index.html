<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>OTA Demo</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- apple-web-app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
  <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#fff;color:#333;font-family:sans-serif;font-size:16px;padding:20px;text-align:center;">
    Carregando...
  </div>
  <app-root></app-root>
  <script>
    window.onerror = function(msg, url, line, col) {
      var el = document.getElementById('app-loading');
      if (el) {
        el.style.color = 'red';
        el.innerHTML = '<b>JS Error:</b><br>' + msg + '<br><br><b>File:</b> ' + (url || '').split('/').pop() + '<br><b>Line:</b> ' + line;
      }
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('app-loading');
      if (el) {
        el.style.color = 'red';
        el.innerHTML = '<b>Promise Error:</b><br>' + (e.reason ? (e.reason.message || e.reason) : 'Unknown');
      }
    });
  </script>
</body>

</html>
